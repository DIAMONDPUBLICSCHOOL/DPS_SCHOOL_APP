    <fieldset>
        <fieldset>
            <form action="{{url_for('user_log_history')}}" method="post">
                <h1>USER LOG HISTORY</h1>
                <b>CHOOSE USER TYPE <label>*</label></b>
                <select name="USER_TYPE" id="nor_opt" required>
                    <option value="">---SELECT---</option>
                    <option value="STUDENT">STUDENT</option>
                    <option value="TEACHER">TEACHER</option>
                </select>
                <b>ENTER ID <label>*</label></b>
                <input type="number" name="USER_ID" id="nor_input" min="0" placeholder="ENTER ID" required>
                <button id="nor_btn">VIEW</button>
            </form>
        </fieldset>
        <fieldset>
            {{code|safe}}
        </fieldset>
    </fieldset>
