<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <link rel="icon" type="image/png" href="{{url_for('static',filename='images/SYMBOLS.png')}}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>DIAMOND PUBLIC SCHOOL</title>
</head>
<body><ul id="nav">
    <li><a href="dashboard"><i class="fa fa-home"></i></a></li>
    <img src="static/images/SYMBOLS.png" alt="SYMBOL">
    <li>DIAMOND PUBLIC SCHOOL</li>
  </ul>
    <fieldset>
        <fieldset>
            <form action="{{url_for('st_attendance_teacher')}}" method="post">
                <input name="stage" value="st1" hidden>
                <h1>STUDENT ATTANDANCE</h1>
                <b>ATTANDANCE DATE:- <label id="dt"></label></b><br><br>
                <b>CHOOSE CLASS <label>*</label></b>
                <select id="nor_opt" name="st_class" required>
                    <option value="">---SELECT---</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                </select>
            <button id="nor_btn">LOAD SUBJECTS</button></form>
        </fieldset>
        <fieldset>
            <form action="{{url_for('st_attendance_teacher')}}" method="post">
                <input name="stage" value="st2" hidden>
                {{code|safe}}
            </form>
        </fieldset>
        <fieldset>
            <form action="{{url_for('st_attendance_teacher')}}" method="post">
                <input name="stage" value="st3" hidden>
                <input type="date" id="dt" hidden>
                {{code2|safe}}
            </form>
        </fieldset>
    </fieldset>
    <script>
        document.getElementById('dt').innerHTML = new Date().toISOString().split('T')[0]
    </script>

</body>
</html>
